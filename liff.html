<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約</title>
  <link rel="stylesheet" href="liff.css">
</head>
<body>
  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p>読み込んでいます...</p>
  </div>

  <div id="app" class="container" style="display: none;">
    <header>
      <h1 id="shopName"></h1>
      <p id="welcomeMessage"></p>
    </header>

    <main>
      <!-- ステップ1: 予約経験の選択 -->
      <section id="section-step1-visit-experience" class="page-section">
        <h2>ご予約経験</h2>
        <div class="selection-group">
          <button class="selection-button" data-next-step="step2-booking-type" data-value="first-time">初めてのご予約</button>
          <button class="selection-button" data-next-step="step2-booking-type" data-value="repeat">2回目以降のご予約</button>
        </div>
      </section>

      <!-- ステップ2: 予約種別の選択 -->
      <section id="section-step2-booking-type" class="page-section" style="display: none;">
        <h2>ご予約の種類</h2>
        <div class="selection-group">
          <button class="selection-button" data-next-step="step3-menu">新規の予約</button>
          <button class="selection-button" data-next-step="unimplemented">予約内容の確認・変更</button>
        </div>
        <button class="back-button" data-prev-step="step1-visit-experience">戻る</button>
      </section>

      <!-- ステップ3: メニュー選択 -->
      <section id="section-step3-menu" class="page-section" style="display: none;">
        <h2>メニュー選択</h2>
        <div id="menu-list-container" class="selection-group">
          <!-- メニューがここに動的に追加されます -->
        </div>
        <button class="back-button" data-prev-step="step2-booking-type">戻る</button>
      </section>

      <!-- ステップ4: 日時選択（担当者選択を統合） -->
      <section id="section-step4-datetime" class="page-section" style="display: none;">
        <h2>時間帯の選択</h2>
        
        <!-- ▼▼▼【ここから構造を変更】▼▼▼ -->
        <div id="staff-selector-container" style="display: none;">
          <label for="staff-selector" class="form-label">担当者の指名</label>
          <select id="staff-selector" class="form-control"></select>
        </div>

        <div id="timetable-container">
          <div class="timetable-nav">
            <button id="prev-week-button">＜ 前の週</button>
            <h3 id="month-display"></h3>
            <button id="next-week-button">次の週 ＞</button>
          </div>
          <div class="timetable-wrapper">
            <table id="timetable">
              <thead>
                <!-- ヘッダーがここに動的に生成されます -->
              </thead>
              <tbody>
                <!-- 時間枠がここに動的に生成されます -->
              </tbody>
            </table>
          </div>
          <p class="info-text" id="lookahead-days-info"></p>
        </div>
        <!-- ▲▲▲【ここまで構造を変更】▲▲▲ -->

        <div class="navigation-buttons">
          <button class="back-button" data-prev-step="step3-menu">戻る</button>
          <button id="submitButton" class="submit-button" disabled>下に進んで予約を確定</button>
        </div>
      </section>

    </main>
  </div>

  <div id="error" class="error-container" style="display: none;">
    <h2>エラーが発生しました</h2>
    <p id="errorMessage"></p>
  </div>

  <div id="bookingComplete" class="container" style="display: none;">
    <header>
      <h1 id="completeShopName"></h1>
    </header>
    <main>
      <div class="complete-message">
        <h2>ご予約が完了しました</h2>
        <p><span id="completeUserName"></span>様のご予約を承りました。</p>
        <div class="booking-details">
          <p><strong>日時:</strong> <span id="completeDateTime"></span></p>
          <p><strong>メニュー:</strong> <span id="completeMenuName"></span></p>
          <p id="completeStaffP" style="display: none;"><strong>担当者:</strong> <span id="completeStaffName"></span></p>
        </div>
        <p class="info-text">
          ご予約内容の確認や変更・キャンセルは、LINEのトーク画面下部のメニューから行えます。
        </p>
      </div>
      <div class="calendar-actions">
        <h3>カレンダーに登録</h3>
        <a id="googleCalendarLink" href="#" target="_blank" class="calendar-button google">Googleカレンダーに追加</a>
      </div>
    </main>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="liff.js"></script>
</body>
</html>
