<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カレンダーに追加</title>
  <style>
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: #f0f2f5;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 22px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.09);
      text-align: center;
    }
    h1 {
      font-size: 1.1em;
      margin: 0 0 12px;
      color: #2c3e50;
    }
    p {
      font-size: 0.92em;
      color: #7f8c8d;
      line-height: 1.6;
      margin: 0 0 20px;
    }
    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      background: #27ae60;
      color: #fff;
      font-size: 0.93em;
      font-weight: bold;
      cursor: pointer;
    }
    .error { color: #c0392b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>カレンダーに登録</h1>
    <p id="message">下のボタンを押すと、端末のカレンダーに予約が追加されます。</p>
    <button id="addToCalendarBtn" type="button" style="display: none;">📅 カレンダーに追加</button>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const storageKey = params.get('key');
      const encoded = params.get('d');
      const messageEl = document.getElementById('message');
      const buttonEl = document.getElementById('addToCalendarBtn');

      let icsContent = storageKey ? sessionStorage.getItem(storageKey) : null;

      if (!icsContent && encoded) {
        try {
          const binary = atob(encoded);
          const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
          icsContent = new TextDecoder('utf-8').decode(bytes);
        } catch (error) {
          icsContent = null;
        }
      }

      if (!icsContent) {
        messageEl.textContent = '予約情報が見つかりませんでした。予約完了画面から再度お試しください。';
        messageEl.classList.add('error');
        return;
      }

      buttonEl.style.display = 'block';
      buttonEl.addEventListener('click', () => {
        const dataUri = 'data:text/calendar;charset=utf-8,' + encodeURIComponent(icsContent);
        window.location.href = dataUri;
        if (storageKey) {
          sessionStorage.removeItem(storageKey);
        }
      });
    })();
  </script>
</body>
</html>
