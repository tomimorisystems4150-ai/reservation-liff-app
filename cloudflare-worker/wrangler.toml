name = "reservation-onboarding"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for OAuth state management
# Run: wrangler kv:namespace create ONBOARDING_KV
# Then replace the id below with the output
[[kv_namespaces]]
binding = "ONBOARDING_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Environment variables (set secrets via: wrangler secret put VARIABLE_NAME)
# GOOGLE_CLIENT_ID      - OAuth 2.0 client ID from Google Cloud Console
# GOOGLE_CLIENT_SECRET  - OAuth 2.0 client secret
# TEMPLATE_SS_ID        - Template spreadsheet ID (clean copy with all sheets initialized)
# WORKER_URL            - This worker's public URL (e.g. https://reservation-onboarding.xxx.workers.dev)
# GITHUB_REPO           - GitHub repo (e.g. tomimorisystems4150-ai/reservation-liff-app)
# GITHUB_BRANCH         - Branch to fetch scripts from (e.g. main)
