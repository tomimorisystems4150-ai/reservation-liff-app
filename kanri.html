<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

    /* Sticky header + tabs */
    .sticky-top { position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }

    /* Header */
    .header { background: #2c3e50; color: #fff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.1em; }

    .header-user { font-size: 0.78em; opacity: 0.75; text-align: right; }
    .header-link { color: rgba(255,255,255,0.75); font-size: 0.82em; text-decoration: none; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; white-space: nowrap; }

    /* Tabs */

    .tab-btn { flex: 1; padding: 11px 4px; background: none; border: none; color: rgba(255,255,255,0.65); cursor: pointer; font-size: 0.82em; border-bottom: 3px solid transparent; transition: all 0.2s; position: relative; }
    .tab-btn.active { color: #fff; border-bottom-color: #3498db; }

    .tab-content { display: none; padding: 14px; }

    /* Filter */

    /* Cards */
    .card { background: #fff; border-radius: 10px; padding: 13px 15px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.09); }

    .analytics-row:last-child { margin-bottom: 0; }

    .toast.show { opacity: 1; }
    .toast.ok  { background: #3498db; }

<script>
<?
  var _gasDeployUrl = ScriptApp.getService().getUrl();
?>
const GAS_DEPLOY_URL = <?!= JSON.stringify(_gasDeployUrl) ?>;
const SHOP_NAME    = <?!= JSON.stringify(shopName) ?>;
const CURRENT_USER = <?!= JSON.stringify(currentUser) ?>;

document.getElementById('shop-name-display').textContent = SHOP_NAME;
document.getElementById('user-display').textContent = CURRENT_USER;
document.getElementById('linkSettings').href = GAS_DEPLOY_URL;

// ===== State =====
let currentFilter    = 'all';
let currentStatusFilter = 'all';
let bookingSearchQuery = '';
let allBookings      = [];
let allCustomers     = [];
let eodUnconfirmed   = [];

// ===== Tab navigation =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'booking')   loadBookings(currentFilter);
    if (tab === 'endofday')  loadEndOfDay();
    if (tab === 'customer' && allCustomers.length === 0) loadCustomers();
    if (tab === 'errorlog')  loadErrorLogs();
  });
});

// ===== Booking search =====
document.getElementById('booking-search').addEventListener('input', e => {
  bookingSearchQuery = e.target.value.trim();
  loadBookings(currentFilter);
});

// ===== Filter buttons =====
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    loadBookings(currentFilter);
  });
});

document.querySelectorAll('.status-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.status-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatusFilter = btn.dataset.status;
    renderBookings(allBookings);
  });
});

// ===== Customer search =====
document.getElementById('customer-search').addEventListener('input', e => {
  const q = e.target.value.trim().replace(/\s+/g, '');
  renderCustomers(q ? allCustomers.filter(c => String(c.name || '').replace(/\s+/g, '').includes(q)) : allCustomers);
});

// ===== End-of-day selection =====
document.getElementById('eod-select-all-btn').addEventListener('click', () => {
  document.querySelectorAll('#endofday-list .eod-check').forEach(cb => { cb.checked = true; });
  updateEodBatchButtons();
});
document.getElementById('eod-deselect-all-btn').addEventListener('click', () => {
  document.querySelectorAll('#endofday-list .eod-check').forEach(cb => { cb.checked = false; });
  updateEodBatchButtons();
});
document.getElementById('eod-batch-visit-btn').addEventListener('click', () => eodBatchConfirm('来店'));
document.getElementById('eod-batch-noshow-btn').addEventListener('click', () => eodBatchConfirm('無断キャンセル'));
document.getElementById('eod-batch-cancel-btn').addEventListener('click', () => eodBatchConfirm('キャンセル'));
document.getElementById('endofday-list').addEventListener('change', e => {
  if (e.target.classList.contains('eod-check')) updateEodBatchButtons();
});

function getEodCheckedIds() {
  return Array.from(document.querySelectorAll('#endofday-list .eod-check:checked'))
    .map(cb => cb.value);
}

function updateEodBatchButtons() {
  const hasSelection = getEodCheckedIds().length > 0;
  document.getElementById('eod-batch-visit-btn').disabled = !hasSelection;
  document.getElementById('eod-batch-noshow-btn').disabled = !hasSelection;
  document.getElementById('eod-batch-cancel-btn').disabled = !hasSelection;
}

function eodBatchConfirm(status) {
  const ids = getEodCheckedIds();
  const labels = { '来店': '来店確定', 'キャンセル': 'キャンセル', '無断キャンセル': '無断キャンセル' };
  if (!ids.length) return;
  if (!confirm('選択した ' + ids.length + ' 件を「' + labels[status] + '」にしますか？')) return;
  setLoading('endofday-list');
  google.script.run
    .withSuccessHandler(() => {
      toast(ids.length + ' 件を' + labels[status] + 'に更新しました', 'ok');
      loadEndOfDay();
    })
    .withFailureHandler(e => {
      toast('エラー: ' + e.message, 'err');
      loadEndOfDay();
    })
    .batchConfirmStatuses(ids, status);
}

// ===== Customer modal =====
document.getElementById('cust-modal-close').addEventListener('click', closeModal);
document.getElementById('cust-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('modal-save-btn').addEventListener('click', saveCustomer);

// ===== Load bookings =====
function loadBookings(filter) {
  setLoading('booking-list');
  google.script.run
    .withSuccessHandler(data => { allBookings = data; renderBookings(data); })
    .withFailureHandler(e => setError('booking-list', e.message))
    .getBookingsForManagement(filter, bookingSearchQuery);
}

function matchesStatusFilter_(status) {
  if (currentStatusFilter === 'all') return true;
  if (currentStatusFilter === '予約') return status === '予約' || status === '仮予約';
  return status === currentStatusFilter;
}

function renderBookings(bookings) {
  const el = document.getElementById('booking-list');
  const filtered = (bookings || []).filter(b => matchesStatusFilter_(b.status));
  if (!filtered.length) {
    el.innerHTML = '<div class="empty"><div class="empty-message">該当する予約はありません</div></div>';
    return;
  }
  el.innerHTML = filtered.map(b => bookingCard(b, false)).join('');
}

// ===== Load end-of-day =====
function loadEndOfDay() {
  setLoading('endofday-list');
  google.script.run
    .withSuccessHandler(data => {
      eodUnconfirmed = data;
      renderEOD(data);
      const badge = document.getElementById('eod-badge');
      if (data.length) { badge.textContent = data.length; badge.style.display = 'inline'; }
      else { badge.style.display = 'none'; }
      updateEodBatchButtons();
    })
    .withFailureHandler(e => setError('endofday-list', e.message))
    .getUnconfirmedTodayBookings();
}

function formatEodDatetime(isoString) {
  const d = new Date(isoString);
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  const now = new Date();
  const isToday = d.getFullYear() === now.getFullYear()
    && d.getMonth() === now.getMonth()
    && d.getDate() === now.getDate();
  const time = pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' 〜';
  if (isToday) return { dateLabel: '', timeLabel: time };
  return {
    dateLabel: (d.getMonth() + 1) + '月' + d.getDate() + '日(' + days[d.getDay()] + ')',
    timeLabel: time,
  };
}

function renderEOD(bookings) {
  const el = document.getElementById('endofday-list');
  if (!bookings || !bookings.length) {
    el.innerHTML = '<div class="empty"><div class="empty-message">未確定予約はありません</div></div>';
    return;
  }
  el.innerHTML = bookings.map(b => eodBookingCard(b)).join('');
  updateEodBatchButtons();
}

function eodBookingCard(b) {
  const dt = formatEodDatetime(b.startTime);
  const staff = b.staffName && b.staffName !== '指名なし' ? ' / ' + escapeHtml(b.staffName) : '';
  const bookingId = escapeHtml(b.bookingId);
  return `<div class="card eod-card" id="eod-${bookingId}">
    <input type="checkbox" class="eod-check" value="${bookingId}" aria-label="予約を選択">
    <div class="eod-card-body">
      ${dt.dateLabel ? '<div class="eod-date-label">' + dt.dateLabel + '</div>' : ''}
      <div class="card-header">
        <div class="card-datetime">${dt.timeLabel}</div>
        <span class="badge badge-${b.status}">${escapeHtml(b.status)}</span>
      </div>
      <div class="card-name">👤 ${escapeHtml(b.userName)}</div>
      <div class="card-meta">📋 ${escapeHtml(b.menuName)}${staff}</div>
    </div>
  </div>`;
}

// ===== Booking card HTML =====
function bookingCard(b, eodMode) {
  const d    = new Date(b.startTime);
  const days = ['日','月','火','水','木','金','土'];
  const dt   = eodMode
    ? pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' 〜'
    : (d.getMonth()+1) + '月' + d.getDate() + '日(' + days[d.getDay()] + ') ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  const staff  = b.staffName && b.staffName !== '指名なし' ? ' / ' + b.staffName : '';
  const isPend = b.status === '予約' || b.status === '仮予約';
  const prefix = eodMode ? 'eod' : 'bk';
  const actions = isPend ? `
    <button class="btn btn-visit"   onclick="doConfirm('${b.bookingId}','来店','${prefix}')">来店確定</button>
    <button class="btn btn-noshow"  onclick="doConfirm('${b.bookingId}','無断キャンセル','${prefix}')">無断キャンセル</button>
    <button class="btn btn-cancel"  onclick="doConfirm('${b.bookingId}','キャンセル','${prefix}')">キャンセル</button>` : '';
  return `<div class="card" id="${prefix}-${b.bookingId}">
    <div class="card-header">
      <div class="card-datetime">${dt}</div>
      <span class="badge badge-${b.status}">${b.status}</span>
    </div>
    <div class="card-name">👤 ${b.userName}</div>
    <div class="card-meta">📋 ${b.menuName}${staff}</div>
    ${isPend ? '<div class="card-actions">' + actions + '</div>' : ''}
  </div>`;
}

function doConfirm(bookingId, status, prefix) {
  const labels = { '来店':'来店確定', 'キャンセル':'キャンセル', '無断キャンセル':'無断キャンセル' };
  if (!confirm('「' + labels[status] + '」で確定しますか？')) return;
  const card = document.getElementById(prefix + '-' + bookingId);
  if (card) card.style.opacity = '0.45';
  google.script.run
    .withSuccessHandler(() => {
      toast(labels[status] + 'に更新しました', 'ok');
      if (prefix === 'eod') loadEndOfDay(); else loadBookings(currentFilter);
    })
    .withFailureHandler(e => { toast('エラー: ' + e.message, 'err'); if (card) card.style.opacity = '1'; })
    .confirmBookingStatus(bookingId, status);
}

// ===== Load customers =====
function loadCustomers() {
  setLoading('customer-list');
  google.script.run
    .withSuccessHandler(data => { allCustomers = data; renderCustomers(data); })
    .withFailureHandler(e => setError('customer-list', e.message))
    .getCustomersForManagement();
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function renderCustomerAnalyticsHtml(c) {
  const firstVisit = c.firstVisitDate
    ? new Date(c.firstVisitDate + 'T00:00:00').toLocaleDateString('ja-JP')
    : '—';
  return `
    <div class="analytics-row"><span class="analytics-label">来店回数</span><span>${c.visitCount || 0}回</span></div>
    <div class="analytics-row"><span class="analytics-label">初回来店日</span><span>${firstVisit}</span></div>
    <div class="analytics-row"><span class="analytics-label">キャンセル率</span><span>${c.cancelRate || 0}%</span></div>
    <div class="analytics-row"><span class="analytics-label">無断率</span><span>${c.noShowRate || 0}%</span></div>
    <div class="analytics-row"><span class="analytics-label">よく使うメニュー</span><span>${escapeHtml(c.topMenu || '—')}</span></div>
    <div class="analytics-row"><span class="analytics-label">担当者指名傾向</span><span>${escapeHtml(c.staffTendency || '—')}</span></div>
  `;
}

function renderCustomers(list) {
  const el = document.getElementById('customer-list');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div>顧客データがありません</div></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const lastVisit = c.lastVisit ? '最終来店: ' + new Date(c.lastVisit).toLocaleDateString('ja-JP') : '来店履歴なし';
    const profile = [c.gender, c.ageGroup].filter(Boolean).join(' / ') || '属性未登録';
    const uid = String(c.lineUserId).replace(/'/g, "\\'");
    return `<div class="cust-card">
      <div>
        <div class="cust-name">${escapeHtml(c.name)} <span class="cust-status-${c.status}">${c.status}</span></div>
        <div class="cust-sub">${escapeHtml(profile)}</div>
        <div class="cust-sub">来店 ${c.visitCount || 0}回 / キャンセル ${c.cancelRate || 0}% / 無断 ${c.noShowRate || 0}%</div>
        <div class="cust-sub">${lastVisit}</div>
        ${c.memo ? '<div class="cust-sub">' + escapeHtml(c.memo) + '</div>' : ''}
      </div>
      <button class="btn btn-outline" onclick="openModal('${uid}')">編集</button>
    </div>`;
  }).join('');
}

// ===== Customer modal =====
function openModal(uid) {
  const c = allCustomers.find(x => x.lineUserId === uid);
  if (!c) return;
  document.getElementById('modal-uid').value       = uid;
  document.getElementById('modal-name').value      = c.name || '';
  document.querySelectorAll('input[name="modal-gender"]').forEach(r => {
    r.checked = (r.value === c.gender);
  });
  document.getElementById('modal-age-group').value = c.ageGroup || '';
  document.getElementById('modal-phone').value     = c.phone || '';
  document.getElementById('modal-birth-date').value = c.birthDate || '';
  document.getElementById('modal-address').value   = c.address || '';
  document.getElementById('modal-memo').value      = c.memo || '';
  document.getElementById('modal-status').value    = c.status || '有効';
  document.getElementById('modal-analytics').innerHTML = renderCustomerAnalyticsHtml(c);
  document.getElementById('modal-save-btn').disabled = false;
  document.getElementById('modal-save-btn').textContent = '保存する';
  document.getElementById('cust-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('cust-modal').classList.remove('open');
  document.getElementById('modal-save-btn').disabled = false;
  document.getElementById('modal-save-btn').textContent = '保存する';
}

function saveCustomer() {
  const uid  = document.getElementById('modal-uid').value;
  const name = document.getElementById('modal-name').value.replace(/\s+/g, '');
  const genderInput = document.querySelector('input[name="modal-gender"]:checked');
  if (!name) { alert('氏名を入力してください。'); return; }
  const changes = {
    name:   name,
    gender: genderInput ? genderInput.value : '',
    ageGroup: document.getElementById('modal-age-group').value,
    phone:  document.getElementById('modal-phone').value.trim(),
    birthDate: document.getElementById('modal-birth-date').value.trim(),
    address: document.getElementById('modal-address').value.trim(),
    memo:   document.getElementById('modal-memo').value.trim(),
    status: document.getElementById('modal-status').value
  };
  const saveBtn = document.getElementById('modal-save-btn');
  saveBtn.disabled = true;
  saveBtn.textContent = '保存中...';
  google.script.run
    .withSuccessHandler(() => {
      saveBtn.disabled = false;
      saveBtn.textContent = '保存する';
      toast('顧客情報を更新しました', 'ok');
      closeModal();
      loadCustomers();
    })
    .withFailureHandler(e => {
      toast('エラー: ' + e.message, 'err');
      saveBtn.disabled = false;
      saveBtn.textContent = '保存する';
    })
    .updateCustomerInfo(uid, changes);
}

// ===== Helpers =====
function pad(n) { return String(n).padStart(2, '0'); }

function setLoading(id) {
  document.getElementById(id).innerHTML = '<div class="empty"><div>読み込み中...</div></div>';
}
function setError(id, msg) {
  document.getElementById(id).innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>' + msg + '</div></div>';
}
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== Error log =====
function loadErrorLogs() {
  setLoading('error-log-list');
  google.script.run
    .withSuccessHandler(renderErrorLogs)
    .withFailureHandler(e => setError('error-log-list', e.message))
    .getErrorLogs();
}

function renderErrorLogs(logs) {
  const el = document.getElementById('error-log-list');
  if (!logs || !logs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-message">エラーログはありません</div></div>';
    return;
  }
  el.innerHTML = logs.map((log, idx) => {
    const ts = log.timestamp ? new Date(log.timestamp).toLocaleString('ja-JP') : '';
    const hasStack = !!log.stack;
    return `<div class="log-card">
      <div class="log-ts">${ts}</div>
      <div class="log-fn">${log.functionName || '(不明)'}</div>
      <div class="log-msg">${log.message || ''}</div>
      ${hasStack ? `<span class="log-toggle" onclick="toggleStack(this)">▶ スタックトレースを表示</span><div class="log-stack">${log.stack}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleStack(btn) {
  const stack = btn.nextElementSibling;
  const open = stack.style.display === 'block';
  stack.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '▶ スタックトレースを表示' : '▼ 閉じる';
}

document.getElementById('reload-log-btn').addEventListener('click', loadErrorLogs);
document.getElementById('clear-log-btn').addEventListener('click', () => {
  if (!confirm('エラーログを全件削除しますか？')) return;
  google.script.run
    .withSuccessHandler(() => { toast('ログをクリアしました', 'ok'); loadErrorLogs(); })
    .withFailureHandler(e => toast('エラー: ' + e.message, 'err'))
    .clearErrorLogs();
});

// ===== Initial load =====
loadBookings('all');
loadEndOfDay();
</script>
