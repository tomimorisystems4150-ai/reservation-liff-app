<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sage:       #6B9E78;
      --sage-dark:  #4E7A5A;
      --sage-light: #EBF4ED;
      --terra:      #C47A5A;
      --bg:         #F6F4F1;
      --surface:    #FFFFFF;
      --border:     #E3DDD8;
      --text:       #2A2A2A;
      --text-sub:   #747474;
      --radius-card:12px;
      --shadow:     0 2px 12px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

    /* Header */
    .header {
      background: var(--surface); padding: 13px 18px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid var(--sage-light);
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .header h1 { font-size: 1.05em; font-weight: 700; color: var(--sage-dark); }
    .header-sub { font-size: 0.76em; color: var(--text-sub); margin-top: 2px; }
    .header-user { font-size: 0.76em; color: var(--text-sub); text-align: right; }

    /* Tabs */
    .tab-nav { display: flex; background: var(--surface); border-bottom: 1.5px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 12px 4px; background: none; border: none;
      color: var(--text-sub); cursor: pointer; font-size: 0.82em; font-weight: 500;
      font-family: inherit; border-bottom: 3px solid transparent;
      transition: all 0.2s; position: relative;
    }
    .tab-btn:hover { color: var(--sage-dark); }
    .tab-btn.active { color: var(--sage-dark); border-bottom-color: var(--sage); font-weight: 700; }
    .count-badge {
      background: var(--terra); color: #fff; border-radius: 10px;
      padding: 1px 6px; font-size: 0.72em; font-weight: 700; margin-left: 4px;
    }

    /* Content */
    .tab-content { display: none; padding: 14px; }
    .tab-content.active { display: block; }

    /* Filter */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .filter-btn {
      padding: 6px 14px; border: 1.5px solid var(--border);
      background: var(--surface); color: var(--text-sub);
      border-radius: 20px; cursor: pointer; font-size: 0.82em;
      font-family: inherit; font-weight: 500; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--sage); color: var(--sage-dark); }
    .filter-btn.active { background: var(--sage); border-color: var(--sage); color: #fff; font-weight: 700; }

    /* Cards */
    .card {
      background: var(--surface); border-radius: var(--radius-card);
      padding: 14px 16px; margin-bottom: 10px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      border-left: 4px solid var(--border);
    }
    .card:has(.badge-予約), .card:has(.badge-仮予約) { border-left-color: var(--sage); }
    .card:has(.badge-来店) { border-left-color: #8ABFA8; }
    .card:has(.badge-キャンセル), .card:has(.badge-無断キャンセル) { border-left-color: #CCC; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
    .card-datetime { font-weight: 700; font-size: 0.97em; color: var(--text); }
    .card-name { font-size: 0.9em; color: var(--text); margin-bottom: 3px; font-weight: 500; }
    .card-meta { font-size: 0.82em; color: var(--text-sub); }
    .card-actions { display: flex; gap: 6px; margin-top: 11px; flex-wrap: wrap; }

    /* Status badges */
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.74em; font-weight: 700; white-space: nowrap; }
    .badge-予約, .badge-仮予約 { background: var(--sage-light); color: var(--sage-dark); }
    .badge-来店 { background: #E0F2E8; color: #2D7A4F; }
    .badge-キャンセル { background: #EEECEB; color: #888; }
    .badge-無断キャンセル { background: #FDECEA; color: #B04040; }

    /* Buttons */
    .btn {
      padding: 7px 14px; border: none; border-radius: 8px;
      cursor: pointer; font-size: 0.82em; font-weight: 700;
      font-family: inherit; transition: opacity 0.18s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { opacity: 0.82; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.38; cursor: not-allowed; transform: none; }
    .btn-visit   { background: var(--sage); color: #fff; }
    .btn-noshow  { background: #C05252; color: #fff; }
    .btn-cancel  { background: #A8A8A8; color: #fff; }
    .btn-primary { background: var(--sage); color: #fff; }
    .btn-success { background: var(--sage); color: #fff; }
    .btn-outline {
      background: var(--surface); border: 1.5px solid var(--sage);
      color: var(--sage-dark); font-weight: 600;
    }
    .btn-block   { display: block; width: 100%; margin-top: 10px; padding: 11px; }

    /* Action bar */
    .action-bar { margin-bottom: 14px; display: flex; gap: 8px; align-items: center; }
    .section-label {
      font-size: 0.76em; font-weight: 700; color: var(--text-sub);
      letter-spacing: 0.06em; margin-bottom: 10px; text-transform: uppercase;
    }

    /* Search */
    .search-box {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.92em; font-family: inherit;
      margin-bottom: 12px; background: var(--surface); color: var(--text);
    }
    .search-box:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(107,158,120,0.12); }

    /* Customer card */
    .cust-card {
      background: var(--surface); border-radius: var(--radius-card);
      padding: 13px 15px; margin-bottom: 8px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; gap: 8px;
    }
    .cust-name { font-weight: 700; font-size: 0.95em; }
    .cust-sub { font-size: 0.8em; color: var(--text-sub); margin-top: 3px; }
    .cust-status-有効 { color: var(--sage-dark); font-size: 0.76em; font-weight: 700; margin-left: 6px; }
    .cust-status-無効 { color: #B04040; font-size: 0.76em; font-weight: 700; margin-left: 6px; }

    /* Empty / Loading */
    .empty { text-align: center; padding: 48px 20px; color: #C0BAB4; }
    .empty-icon { font-size: 2.4em; margin-bottom: 10px; }

    /* Modal */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.38); z-index: 1000;
      justify-content: flex-end; align-items: flex-end;
    }
    .modal-backdrop.open { display: flex; }
    .modal-sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      padding: 22px 20px 36px; width: 100%;
      max-width: 500px; max-height: 85vh; overflow-y: auto;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    }
    .modal-title { font-size: 1.05em; font-weight: 700; margin-bottom: 18px; color: var(--sage-dark); }
    .modal-close { float: right; background: none; border: none; font-size: 1.3em; cursor: pointer; color: #C0BAB4; line-height: 1; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 0.8em; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; letter-spacing: 0.03em; }
    .form-control {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-size: 0.92em; font-family: inherit; background: var(--surface); color: var(--text);
    }
    .form-control:focus { outline: none; border-color: var(--sage); box-shadow: 0 0 0 3px rgba(107,158,120,0.12); }
    textarea.form-control { height: 78px; resize: vertical; }

    /* Error log */
    .log-card {
      background: var(--surface); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 8px;
      box-shadow: var(--shadow); border: 1px solid var(--border);
      border-left: 3px solid #C05252;
    }
    .log-ts { font-size: 0.74em; color: #C0BAB4; margin-bottom: 3px; }
    .log-fn { font-size: 0.8em; font-weight: 700; color: #C05252; margin-bottom: 4px; }
    .log-msg { font-size: 0.85em; color: var(--text); word-break: break-all; }
    .log-stack { font-size: 0.74em; color: #B0A8A0; margin-top: 6px; word-break: break-all; white-space: pre-wrap; display: none; }
    .log-toggle { font-size: 0.74em; color: #B0A8A0; cursor: pointer; margin-top: 4px; display: inline-block; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--text); color: #fff;
      padding: 11px 24px; border-radius: 24px; z-index: 2000;
      font-size: 0.87em; font-weight: 500; opacity: 0;
      transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }
    .toast.show { opacity: 1; }
    .toast.ok  { background: var(--sage-dark); }
    .toast.err { background: #B84040; }
  </style>
</head>
<body>

<!-- App -->
<div id="app">
  <header class="header">
    <div>
      <h1>予約管理</h1>
      <div class="header-sub" id="shop-name-display"></div>
    </div>
    <div class="header-user" id="user-display"></div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="booking">予約一覧</button>
    <button class="tab-btn" data-tab="endofday">終業後処理<span id="eod-badge" class="count-badge" style="display:none;"></span></button>
    <button class="tab-btn" data-tab="customer">顧客管理</button>
    <button class="tab-btn" data-tab="errorlog">エラーログ</button>
  </nav>

  <!-- Tab: 予約一覧 -->
  <div id="tab-booking" class="tab-content active">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="today">本日</button>
      <button class="filter-btn" data-filter="recent">直近3日</button>
      <button class="filter-btn" data-filter="upcoming">全件（今後）</button>
    </div>
    <div id="booking-list"><div class="empty"><div class="empty-icon">📅</div><div>読み込み中...</div></div></div>
  </div>

  <!-- Tab: 終業後処理 -->
  <div id="tab-endofday" class="tab-content">
    <div class="action-bar">
      <button id="batch-visit-btn" class="btn btn-success" disabled>全員 来店確定</button>
    </div>
    <div class="section-label">本日の未確定予約</div>
    <div id="endofday-list"><div class="empty"><div class="empty-icon">📋</div><div>読み込み中...</div></div></div>
  </div>

  <!-- Tab: 顧客管理 -->
  <div id="tab-customer" class="tab-content">
    <input type="text" id="customer-search" class="search-box" placeholder="顧客名で検索...">
    <div id="customer-list"><div class="empty"><div class="empty-icon">👤</div><div>読み込み中...</div></div></div>
  </div>

  <!-- Tab: エラーログ -->
  <div id="tab-errorlog" class="tab-content">
    <div class="action-bar">
      <button id="reload-log-btn" class="btn btn-outline">再読み込み</button>
      <button id="clear-log-btn" class="btn btn-cancel">ログをクリア</button>
    </div>
    <div class="section-label">直近100件のエラー（新しい順）</div>
    <div id="error-log-list"><div class="empty"><div>読み込み中...</div></div></div>
  </div>
</div>

<!-- 顧客編集モーダル -->
<div id="cust-modal" class="modal-backdrop">
  <div class="modal-sheet">
    <button class="modal-close" id="cust-modal-close">✕</button>
    <div class="modal-title">顧客情報の編集</div>
    <input type="hidden" id="modal-uid">
    <div class="form-group">
      <label class="form-label">お名前 *</label>
      <input type="text" id="modal-name" class="form-control" placeholder="山田 太郎">
    </div>
    <div class="form-group">
      <label class="form-label">電話番号</label>
      <input type="tel" id="modal-phone" class="form-control" placeholder="090-0000-0000">
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea id="modal-memo" class="form-control"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">ステータス</label>
      <select id="modal-status" class="form-control">
        <option value="有効">有効</option>
        <option value="無効">無効（論理削除）</option>
      </select>
    </div>
    <button class="btn btn-primary btn-block" id="modal-save-btn">保存する</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// GASテンプレート変数
const SHOP_NAME    = <?!= JSON.stringify(shopName) ?>;
const CURRENT_USER = <?!= JSON.stringify(currentUser) ?>;

document.getElementById('shop-name-display').textContent = SHOP_NAME;
document.getElementById('user-display').textContent = CURRENT_USER;

// ===== State =====
let currentFilter    = 'today';
let allBookings      = [];
let allCustomers     = [];
let todayUnconfirmed = [];

// ===== Tab navigation =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'booking')   loadBookings(currentFilter);
    if (tab === 'endofday')  loadEndOfDay();
    if (tab === 'customer' && allCustomers.length === 0) loadCustomers();
    if (tab === 'errorlog')  loadErrorLogs();
  });
});

// ===== Filter buttons =====
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    loadBookings(currentFilter);
  });
});

// ===== Customer search =====
document.getElementById('customer-search').addEventListener('input', e => {
  const q = e.target.value.trim();
  renderCustomers(q ? allCustomers.filter(c => c.name.includes(q)) : allCustomers);
});

// ===== Batch visit =====
document.getElementById('batch-visit-btn').addEventListener('click', () => {
  const ids = todayUnconfirmed.map(b => b.bookingId);
  if (!ids.length || !confirm('本日の未確定予約 ' + ids.length + ' 件をすべて「来店確定」にしますか？')) return;
  setLoading('endofday-list');
  google.script.run
    .withSuccessHandler(() => { toast('一括来店確定が完了しました', 'ok'); loadEndOfDay(); })
    .withFailureHandler(e => toast('エラー: ' + e.message, 'err'))
    .batchConfirmStatuses(ids, '来店');
});

// ===== Customer modal =====
document.getElementById('cust-modal-close').addEventListener('click', closeModal);
document.getElementById('cust-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('modal-save-btn').addEventListener('click', saveCustomer);

// ===== Load bookings =====
function loadBookings(filter) {
  setLoading('booking-list');
  google.script.run
    .withSuccessHandler(data => { allBookings = data; renderBookings(data); })
    .withFailureHandler(e => setError('booking-list', e.message))
    .getBookingsForManagement(filter);
}

function renderBookings(bookings) {
  const el = document.getElementById('booking-list');
  if (!bookings || !bookings.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📅</div><div>該当する予約はありません</div></div>';
    return;
  }
  el.innerHTML = bookings.map(b => bookingCard(b, false)).join('');
}

// ===== Load end-of-day =====
function loadEndOfDay() {
  setLoading('endofday-list');
  google.script.run
    .withSuccessHandler(data => {
      todayUnconfirmed = data;
      renderEOD(data);
      const badge = document.getElementById('eod-badge');
      if (data.length) { badge.textContent = data.length; badge.style.display = 'inline'; }
      else { badge.style.display = 'none'; }
      document.getElementById('batch-visit-btn').disabled = !data.length;
    })
    .withFailureHandler(e => setError('endofday-list', e.message))
    .getUnconfirmedTodayBookings();
}

function renderEOD(bookings) {
  const el = document.getElementById('endofday-list');
  if (!bookings || !bookings.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div>本日の未確定予約はありません</div></div>';
    return;
  }
  el.innerHTML = bookings.map(b => bookingCard(b, true)).join('');
}

// ===== Booking card HTML =====
function bookingCard(b, eodMode) {
  const d    = new Date(b.startTime);
  const days = ['日','月','火','水','木','金','土'];
  const dt   = eodMode
    ? pad(d.getHours()) + ':' + pad(d.getMinutes()) + ' 〜'
    : (d.getMonth()+1) + '月' + d.getDate() + '日(' + days[d.getDay()] + ') ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  const staff  = b.staffName && b.staffName !== '指名なし' ? ' / ' + b.staffName : '';
  const isPend = b.status === '予約' || b.status === '仮予約';
  const prefix = eodMode ? 'eod' : 'bk';
  const actions = isPend ? `
    <button class="btn btn-visit"   onclick="doConfirm('${b.bookingId}','来店','${prefix}')">来店確定</button>
    <button class="btn btn-noshow"  onclick="doConfirm('${b.bookingId}','無断キャンセル','${prefix}')">無断キャンセル</button>
    <button class="btn btn-cancel"  onclick="doConfirm('${b.bookingId}','キャンセル','${prefix}')">キャンセル</button>` : '';
  return `<div class="card" id="${prefix}-${b.bookingId}">
    <div class="card-header">
      <div class="card-datetime">${dt}</div>
      <span class="badge badge-${b.status}">${b.status}</span>
    </div>
    <div class="card-name">👤 ${b.userName}</div>
    <div class="card-meta">📋 ${b.menuName}${staff}</div>
    ${isPend ? '<div class="card-actions">' + actions + '</div>' : ''}
  </div>`;
}

function doConfirm(bookingId, status, prefix) {
  const labels = { '来店':'来店確定', 'キャンセル':'キャンセル', '無断キャンセル':'無断キャンセル' };
  if (!confirm('「' + labels[status] + '」で確定しますか？')) return;
  const card = document.getElementById(prefix + '-' + bookingId);
  if (card) card.style.opacity = '0.45';
  google.script.run
    .withSuccessHandler(() => {
      toast(labels[status] + 'に更新しました', 'ok');
      if (prefix === 'eod') loadEndOfDay(); else loadBookings(currentFilter);
    })
    .withFailureHandler(e => { toast('エラー: ' + e.message, 'err'); if (card) card.style.opacity = '1'; })
    .confirmBookingStatus(bookingId, status);
}

// ===== Load customers =====
function loadCustomers() {
  setLoading('customer-list');
  google.script.run
    .withSuccessHandler(data => { allCustomers = data; renderCustomers(data); })
    .withFailureHandler(e => setError('customer-list', e.message))
    .getCustomersForManagement();
}

function renderCustomers(list) {
  const el = document.getElementById('customer-list');
  if (!list || !list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div>顧客データがありません</div></div>';
    return;
  }
  el.innerHTML = list.map(c => {
    const lastVisit = c.lastVisit ? '最終来店: ' + new Date(c.lastVisit).toLocaleDateString('ja-JP') : '来店履歴なし';
    return `<div class="cust-card">
      <div>
        <div class="cust-name">${c.name} <span class="cust-status-${c.status}">${c.status}</span></div>
        <div class="cust-sub">📞 ${c.phone || '未登録'}</div>
        <div class="cust-sub">🗓 ${lastVisit}</div>
        ${c.memo ? '<div class="cust-sub">📝 ' + c.memo + '</div>' : ''}
      </div>
      <button class="btn btn-outline" onclick="openModal('${c.lineUserId}')">編集</button>
    </div>`;
  }).join('');
}

// ===== Customer modal =====
function openModal(uid) {
  const c = allCustomers.find(x => x.lineUserId === uid);
  if (!c) return;
  document.getElementById('modal-uid').value       = uid;
  document.getElementById('modal-name').value      = c.name || '';
  document.getElementById('modal-phone').value     = c.phone || '';
  document.getElementById('modal-memo').value      = c.memo || '';
  document.getElementById('modal-status').value    = c.status || '有効';
  document.getElementById('cust-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('cust-modal').classList.remove('open');
}

function saveCustomer() {
  const uid  = document.getElementById('modal-uid').value;
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { alert('お名前を入力してください。'); return; }
  const changes = {
    name:   name,
    phone:  document.getElementById('modal-phone').value.trim(),
    memo:   document.getElementById('modal-memo').value.trim(),
    status: document.getElementById('modal-status').value
  };
  document.getElementById('modal-save-btn').disabled = true;
  google.script.run
    .withSuccessHandler(() => { toast('顧客情報を更新しました', 'ok'); closeModal(); loadCustomers(); })
    .withFailureHandler(e => { toast('エラー: ' + e.message, 'err'); document.getElementById('modal-save-btn').disabled = false; })
    .updateCustomerInfo(uid, changes);
}

// ===== Helpers =====
function pad(n) { return String(n).padStart(2, '0'); }

function setLoading(id) {
  document.getElementById(id).innerHTML = '<div class="empty"><div>読み込み中...</div></div>';
}
function setError(id, msg) {
  document.getElementById(id).innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div>' + msg + '</div></div>';
}
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || '') + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ===== Error log =====
function loadErrorLogs() {
  setLoading('error-log-list');
  google.script.run
    .withSuccessHandler(renderErrorLogs)
    .withFailureHandler(e => setError('error-log-list', e.message))
    .getErrorLogs();
}

function renderErrorLogs(logs) {
  const el = document.getElementById('error-log-list');
  if (!logs || !logs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">✅</div><div>エラーログはありません</div></div>';
    return;
  }
  el.innerHTML = logs.map((log, idx) => {
    const ts = log.timestamp ? new Date(log.timestamp).toLocaleString('ja-JP') : '';
    const hasStack = !!log.stack;
    return `<div class="log-card">
      <div class="log-ts">${ts}</div>
      <div class="log-fn">${log.functionName || '(不明)'}</div>
      <div class="log-msg">${log.message || ''}</div>
      ${hasStack ? `<span class="log-toggle" onclick="toggleStack(this)">▶ スタックトレースを表示</span><div class="log-stack">${log.stack}</div>` : ''}
    </div>`;
  }).join('');
}

function toggleStack(btn) {
  const stack = btn.nextElementSibling;
  const open = stack.style.display === 'block';
  stack.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '▶ スタックトレースを表示' : '▼ 閉じる';
}

document.getElementById('reload-log-btn').addEventListener('click', loadErrorLogs);
document.getElementById('clear-log-btn').addEventListener('click', () => {
  if (!confirm('エラーログを全件削除しますか？')) return;
  google.script.run
    .withSuccessHandler(() => { toast('ログをクリアしました', 'ok'); loadErrorLogs(); })
    .withFailureHandler(e => toast('エラー: ' + e.message, 'err'))
    .clearErrorLogs();
});

// ===== Initial load =====
loadBookings('today');
loadEndOfDay();
</script>
